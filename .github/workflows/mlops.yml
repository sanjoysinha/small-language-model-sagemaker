name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'mlops/**'
      - 'config.py'
      - 'data_loader.py'
      - 'train.py'
      - 'inference.py'
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/**'

  schedule:
    # Weekly retraining: Sunday at midnight UTC
    - cron: '0 0 * * 0'

  workflow_dispatch:
    inputs:
      command:
        description: 'Pipeline command to run'
        required: true
        default: 'status'
        type: choice
        options:
          - train
          - evaluate
          - deploy
          - status

env:
  PYTHON_VERSION: '3.9'
  # MLflow uses local file store on CI runner (no S3 tracking server needed)
  MLFLOW_TRACKING_URI: './mlruns'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO: ${{ secrets.ECR_REPO }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_TASK_FAMILY: ${{ secrets.ECS_TASK_FAMILY }}
  ECS_EXECUTION_ROLE_ARN: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check mlops/ config.py data_loader.py train.py inference.py app.py

  retrain:
    name: Retrain Model
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'train')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training
        run: python train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/distilbert-phishing/
          retention-days: 7

  evaluate:
    name: Evaluation Gate
    needs: [lint, retrain]
    if: always() && needs.lint.result == 'success' && (needs.retrain.result == 'success' || needs.retrain.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifact
        if: needs.retrain.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/distilbert-phishing/

      - name: Download model from S3
        if: needs.retrain.result == 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp s3://${{ secrets.S3_ARTIFACT_BUCKET }}/production-model/ models/distilbert-phishing/ --recursive

      - name: Run evaluation gate (threshold check)
        run: python -m mlops.pipeline evaluate --model-dir models/distilbert-phishing

  deploy:
    name: Deploy to ECS
    needs: evaluate
    if: needs.evaluate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download model artifact
        if: needs.retrain.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/distilbert-phishing/

      - name: Download model from S3
        if: needs.retrain.result != 'success'
        run: |
          aws s3 cp s3://${{ secrets.S3_ARTIFACT_BUCKET }}/production-model/ models/distilbert-phishing/ --recursive

      - name: Upload model to S3 (for future deploys)
        run: |
          aws s3 sync models/distilbert-phishing/ s3://${{ secrets.S3_ARTIFACT_BUCKET }}/production-model/ --delete

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:${{ github.sha }}"
          docker buildx build --platform linux/amd64 -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Update ECS task definition and service
        run: |
          # Register new task definition
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family ${{ secrets.ECS_TASK_FAMILY }} \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 1024 \
            --memory 2048 \
            --execution-role-arn ${{ secrets.ECS_EXECUTION_ROLE_ARN }} \
            --container-definitions '[{
              "name": "phishing-detector",
              "image": "'$IMAGE_URI'",
              "portMappings": [{"containerPort": 8000, "protocol": "tcp"}],
              "essential": true,
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/phishing-task",
                  "awslogs-region": "${{ secrets.AWS_REGION }}",
                  "awslogs-stream-prefix": "ecs"
                }
              }
            }]' \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: $TASK_DEF_ARN"

          # Update service
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition $TASK_DEF_ARN \
            --force-new-deployment

          # Wait for stability
          echo "Waiting for deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }}

          echo "Deployment complete!"

  post-deploy:
    name: Post-Deploy Monitoring
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for service to stabilize
        run: sleep 60

      - name: Run post-deploy health checks
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: python -m mlops.pipeline monitor --once --url $API_BASE_URL
