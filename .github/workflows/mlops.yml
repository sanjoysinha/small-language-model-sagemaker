name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'mlops/**'
      - 'config.py'
      - 'data_loader.py'
      - 'train.py'
      - 'inference.py'
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'lambda/**'
      - '.github/workflows/**'

  schedule:
    # Weekly retraining: Sunday at midnight UTC
    - cron: '0 0 * * 0'

  workflow_dispatch:
    inputs:
      command:
        description: 'Pipeline command to run'
        required: true
        default: 'status'
        type: choice
        options:
          - train
          - evaluate
          - deploy
          - status

env:
  PYTHON_VERSION: '3.9'
  # MLflow uses local file store on CI runner (no S3 tracking server needed)
  MLFLOW_TRACKING_URI: './mlruns'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPO: ${{ secrets.ECR_REPO }}
  S3_ARTIFACT_BUCKET: ${{ secrets.S3_ARTIFACT_BUCKET }}
  SAGEMAKER_EXECUTION_ROLE_ARN: ${{ secrets.SAGEMAKER_EXECUTION_ROLE_ARN }}
  SAGEMAKER_ENDPOINT_NAME: ${{ secrets.SAGEMAKER_ENDPOINT_NAME }}
  SAGEMAKER_INSTANCE_TYPE: ${{ secrets.SAGEMAKER_INSTANCE_TYPE }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linter
        run: pip install ruff

      - name: Run ruff
        run: ruff check mlops/ config.py data_loader.py train.py inference.py app.py

  retrain:
    name: Retrain Model
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.command == 'train')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training
        run: python train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/distilbert-phishing/
          retention-days: 7

  evaluate:
    name: Evaluation Gate
    needs: [lint, retrain]
    if: always() && needs.lint.result == 'success' && (needs.retrain.result == 'success' || needs.retrain.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifact
        if: needs.retrain.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/distilbert-phishing/

      - name: Download model from S3
        if: needs.retrain.result == 'skipped'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 cp s3://${{ secrets.S3_ARTIFACT_BUCKET }}/production-model/ models/distilbert-phishing/ --recursive

      - name: Run evaluation gate (threshold check)
        run: python -m mlops.pipeline evaluate --model-dir models/distilbert-phishing

  deploy:
    name: Deploy to SageMaker
    needs: evaluate
    if: needs.evaluate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download model artifact
        if: needs.retrain.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/distilbert-phishing/

      - name: Download model from S3
        if: needs.retrain.result != 'success'
        run: |
          aws s3 cp s3://${{ secrets.S3_ARTIFACT_BUCKET }}/production-model/ models/distilbert-phishing/ --recursive

      - name: Upload model to S3 (production snapshot)
        run: |
          aws s3 sync models/distilbert-phishing/ s3://${{ secrets.S3_ARTIFACT_BUCKET }}/production-model/ --delete

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO }}:${{ github.sha }}"
          docker buildx build --platform linux/amd64 -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Package model as model.tar.gz
        run: |
          tar -czf model.tar.gz -C models/distilbert-phishing .
          echo "Model archive size: $(du -sh model.tar.gz | cut -f1)"

      - name: Upload model.tar.gz to S3
        run: |
          S3_KEY="sagemaker/models/${{ github.sha }}/model.tar.gz"
          aws s3 cp model.tar.gz s3://${{ secrets.S3_ARTIFACT_BUCKET }}/$S3_KEY
          echo "MODEL_DATA_URL=s3://${{ secrets.S3_ARTIFACT_BUCKET }}/$S3_KEY" >> $GITHUB_ENV

      - name: Create SageMaker Model
        run: |
          SM_MODEL_NAME="phishing-distilbert-${{ github.sha }}"
          aws sagemaker create-model \
            --model-name $SM_MODEL_NAME \
            --primary-container \
              Image=${{ env.IMAGE_URI }},ModelDataUrl=${{ env.MODEL_DATA_URL }} \
            --execution-role-arn ${{ secrets.SAGEMAKER_EXECUTION_ROLE_ARN }}
          echo "SM_MODEL_NAME=$SM_MODEL_NAME" >> $GITHUB_ENV

      - name: Create SageMaker EndpointConfig
        run: |
          CONFIG_NAME="${{ secrets.SAGEMAKER_ENDPOINT_NAME }}-config-$(date +%s)"
          aws sagemaker create-endpoint-config \
            --endpoint-config-name $CONFIG_NAME \
            --production-variants \
              VariantName=primary,ModelName=${{ env.SM_MODEL_NAME }},InstanceType=${{ secrets.SAGEMAKER_INSTANCE_TYPE }},InitialInstanceCount=1
          echo "ENDPOINT_CONFIG_NAME=$CONFIG_NAME" >> $GITHUB_ENV

      - name: Create or Update SageMaker Endpoint
        run: |
          ENDPOINT_NAME="${{ secrets.SAGEMAKER_ENDPOINT_NAME }}"
          # Check if endpoint already exists
          if aws sagemaker describe-endpoint --endpoint-name $ENDPOINT_NAME 2>/dev/null; then
            echo "Updating existing endpoint..."
            aws sagemaker update-endpoint \
              --endpoint-name $ENDPOINT_NAME \
              --endpoint-config-name ${{ env.ENDPOINT_CONFIG_NAME }}
          else
            echo "Creating new endpoint..."
            aws sagemaker create-endpoint \
              --endpoint-name $ENDPOINT_NAME \
              --endpoint-config-name ${{ env.ENDPOINT_CONFIG_NAME }}
          fi

          echo "Waiting for endpoint to reach InService status..."
          aws sagemaker wait endpoint-in-service --endpoint-name $ENDPOINT_NAME
          echo "Endpoint is InService: $ENDPOINT_NAME"

  post-deploy:
    name: Post-Deploy Monitoring
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Wait for API Gateway propagation
        run: sleep 30

      - name: Run post-deploy health checks
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SAGEMAKER_ENDPOINT_NAME: ${{ secrets.SAGEMAKER_ENDPOINT_NAME }}
        run: python -m mlops.pipeline monitor --once --url $API_BASE_URL
